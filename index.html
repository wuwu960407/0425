<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
    <style>
      /* 彈窗遮罩層樣式 */
      #modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
      }
      /* Iframe 容器樣式 */
      #workFrame {
        width: 80%;
        height: 80%;
        margin: 5% auto;
        display: block;
        background: white;
        border: 10px solid #333;
        border-radius: 10px;
      }
      /* 關閉按鈕樣式 */
      .close-btn {
        position: absolute;
        top: 20px;
        right: 40px;
        color: white;
        font-size: 40px;
        cursor: pointer;
        font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <!-- 彈窗結構 -->
    <div id="modal-overlay">
      <span class="close-btn" onclick="closeIframe()">&times;</span>
      <iframe id="workFrame" src=""></iframe>
    </div>

    <script src="sketch.js"></script>
  </body>
</html>
